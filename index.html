<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#f5ecdf" />
<title>Countdown to Maternity Leave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================
     COUNTDOWN TO MATERNITY LEAVE
     Design: Soft UI Evolution (wellness palette)
     Target: 25 June 2026
     ============================================ */

  :root {
    --bg:        #f5ecdf;
    --bg-soft:   #ede0cc;
    --ink:       #2a2520;
    --ink-soft:  #6b5d52;
    --accent:    #c97b63;
    --accent-2:  #8a9a7b;
    --pink:      #e9b8a7;
    --gold:      #d4af37;
    --line:      rgba(42,37,32,0.12);
    --shadow:    0 1px 2px rgba(42,37,32,0.04),
                 0 12px 40px -12px rgba(42,37,32,0.18);
    --shadow-lift: 0 2px 4px rgba(42,37,32,0.06),
                   0 24px 60px -16px rgba(42,37,32,0.28);
    --t-fast: 180ms;
    --t-med:  280ms;
    --ease:   cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { min-height: 100%; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(233,184,167,0.35) 0%, transparent 45%),
      radial-gradient(circle at 80% 90%, rgba(138,154,123,0.22) 0%, transparent 50%);
    background-attachment: fixed;
  }

  /* Slowly drifting aurora behind everything */
  body::after {
    content: '';
    position: fixed;
    inset: -20%;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 40% 30% at 30% 30%, rgba(233,184,167,0.28), transparent 60%),
      radial-gradient(ellipse 35% 25% at 70% 70%, rgba(138,154,123,0.22), transparent 60%),
      radial-gradient(ellipse 30% 25% at 50% 50%, rgba(212,175,55,0.10), transparent 60%);
    filter: blur(20px);
    animation: drift 22s ease-in-out infinite alternate;
  }

  /* SVG noise grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.35;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16  0 0 0 0 0.14  0 0 0 0 0.12  0 0 0 0.08 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  /* Floating petals canvas */
  .petals {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .petal {
    position: absolute;
    top: -40px;
    width: 14px;
    height: 14px;
    border-radius: 60% 0 60% 0;
    background: linear-gradient(135deg, var(--pink), var(--accent));
    opacity: 0;
    animation: fall linear infinite;
    will-change: transform, opacity;
  }
  .petal:nth-child(odd) {
    background: linear-gradient(135deg, #f4d7cd, var(--pink));
    width: 10px; height: 10px;
  }
  .petal:nth-child(3n) {
    background: linear-gradient(135deg, #d8e0c7, var(--accent-2));
  }

  .wrap {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 28px 22px 40px;
    max-width: 720px;
    margin: 0 auto;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.8s 0.1s var(--ease) forwards;
  }

  .brand {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 15px;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }

  .brand-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 8px 2px;
    vertical-align: middle;
    box-shadow: 0 0 0 0 rgba(201,123,99,0.5);
    animation: dotPulse 2.4s ease-in-out infinite;
  }

  .date-stamp {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
  }

  /* ---------- Hero ---------- */
  .hero {
    text-align: center;
    padding: 8px 0 16px;
    opacity: 0;
    animation: fadeUp 0.9s 0.25s var(--ease) forwards;
  }

  .eyebrow {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 17px;
    color: var(--accent);
    letter-spacing: 0.01em;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(34px, 7vw, 48px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
    font-weight: 300;
    background: linear-gradient(90deg, var(--accent), var(--pink), var(--accent));
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmerText 6s ease-in-out infinite;
  }

  .target-line {
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .target-line strong {
    color: var(--ink);
    font-weight: 500;
  }

  /* ---------- The main number ---------- */
  .main-card {
    background: linear-gradient(180deg, #fdf8ef 0%, #f8eedd 100%);
    border: 1px solid var(--line);
    border-radius: 28px;
    padding: 40px 28px 36px;
    text-align: center;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeUp 1s 0.4s var(--ease) forwards;
    position: relative;
    overflow: hidden;
    transition: transform var(--t-med) var(--ease),
                box-shadow var(--t-med) var(--ease);
    transform-style: preserve-3d;
    will-change: transform;
  }
  .main-card:hover {
    box-shadow: var(--shadow-lift);
  }

  /* decorative arch */
  .main-card::before {
    content: '';
    position: absolute;
    top: -60px;
    left: 50%;
    transform: translateX(-50%);
    width: 120%;
    height: 120px;
    background: radial-gradient(ellipse at center top, rgba(233,184,167,0.45) 0%, transparent 70%);
    pointer-events: none;
    animation: glow 5s ease-in-out infinite alternate;
  }

  /* gentle inner highlight */
  .main-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(255,255,255,0.5), transparent 30%);
    mix-blend-mode: overlay;
  }

  .label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 18px;
    position: relative;
  }

  .big-number {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(96px, 28vw, 168px);
    line-height: 0.9;
    color: var(--ink);
    letter-spacing: -0.04em;
    position: relative;
    font-variant-numeric: tabular-nums;
    transition: transform var(--t-med) var(--ease);
  }

  .big-number.bump { animation: bump 600ms var(--ease); }

  .unit {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 22px;
    color: var(--accent);
    margin-top: 6px;
  }

  /* ---------- Secondary stats grid ---------- */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1s 0.55s var(--ease) forwards;
  }

  .stat {
    background: rgba(253, 248, 239, 0.7);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px 18px;
    text-align: center;
    backdrop-filter: blur(8px);
    transition: transform var(--t-fast) var(--ease),
                box-shadow var(--t-fast) var(--ease),
                background var(--t-fast) var(--ease);
    cursor: default;
  }
  .stat:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow);
    background: rgba(253, 248, 239, 0.95);
  }

  .stat-num {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 38px;
    line-height: 1;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 8px;
  }

  /* ---------- Progress bar ---------- */
  .progress-wrap {
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 1s 0.7s var(--ease) forwards;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .progress-header strong {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 18px;
    color: var(--accent);
    text-transform: none;
    letter-spacing: 0;
  }

  .progress-track {
    height: 10px;
    background: rgba(42,37,32,0.08);
    border-radius: 100px;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 1px 2px rgba(42,37,32,0.08);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), var(--accent), var(--gold), var(--accent), var(--pink));
    background-size: 300% 100%;
    border-radius: 100px;
    width: 0%;
    transition: width 1.6s cubic-bezier(0.65, 0, 0.35, 1);
    position: relative;
    animation: flowBg 8s linear infinite;
  }

  /* shimmer sweep on progress */
  .progress-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
    transform: translateX(-100%);
    animation: shimmer 2.6s ease-in-out infinite;
  }

  /* ---------- Footer note ---------- */
  .note {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.55;
    padding: 18px 12px;
    margin-top: auto;
    opacity: 0;
    animation: fadeUp 1s 0.85s var(--ease) forwards;
  }

  .note .heart {
    color: var(--accent);
    display: inline-block;
    animation: pulse 2.4s ease-in-out infinite;
    cursor: pointer;
    transition: transform var(--t-fast) var(--ease);
  }
  .note .heart:hover {
    transform: scale(1.4);
  }

  /* burst hearts on click */
  .burst-heart {
    position: fixed;
    pointer-events: none;
    color: var(--accent);
    font-size: 18px;
    z-index: 10;
    animation: burst 1.2s ease-out forwards;
  }

  /* ---------- Done state ---------- */
  .done .main-card {
    background: linear-gradient(180deg, #f4eadc 0%, #e9b8a7 100%);
  }

  .done .big-number {
    font-size: clamp(48px, 12vw, 80px);
    font-style: italic;
  }

  /* ---------- Animations ---------- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.18); }
  }

  @keyframes dotPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,123,99,0.5); }
    50%      { box-shadow: 0 0 0 6px rgba(201,123,99,0); }
  }

  @keyframes drift {
    0%   { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(-4%, 3%) rotate(2deg); }
  }

  @keyframes glow {
    0%   { opacity: 0.7; }
    100% { opacity: 1; }
  }

  @keyframes shimmer {
    0%   { transform: translateX(-100%); }
    60%  { transform: translateX(100%); }
    100% { transform: translateX(100%); }
  }

  @keyframes flowBg {
    0%   { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  @keyframes shimmerText {
    0%, 100% { background-position: 0% center; }
    50%      { background-position: 100% center; }
  }

  @keyframes bump {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  @keyframes fall {
    0%   { transform: translate3d(0, -10vh, 0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.9; }
    90%  { opacity: 0.9; }
    100% { transform: translate3d(var(--drift, 40px), 110vh, 0) rotate(540deg); opacity: 0; }
  }

  @keyframes burst {
    0%   { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translate(calc(-50% + var(--bx, 0px)), calc(-50% + var(--by, -80px))) scale(1.4); opacity: 0; }
  }

  /* tighter on small screens */
  @media (max-width: 380px) {
    .wrap { padding: 22px 16px 32px; }
    .main-card { padding: 32px 18px 28px; }
    .stat { padding: 18px 12px; }
    .stat-num { font-size: 32px; }
  }

  /* Accessibility — respect reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    .petals { display: none; }
  }
</style>
</head>
<body>

<div class="petals" aria-hidden="true" id="petals"></div>

<div class="wrap" id="root">

  <header>
    <div class="brand">
      For my love<span class="brand-dot"></span><em>almost there</em>
    </div>
    <div class="date-stamp" id="todayStamp">—</div>
  </header>

  <section class="hero">
    <div class="eyebrow">a small countdown,</div>
    <h1>until <em>maternity leave</em></h1>
    <div class="target-line">
      target · <strong id="targetDate">25 June 2026</strong>
    </div>
  </section>

  <section class="main-card" id="mainCard">
    <div class="label">Working days remaining</div>
    <div class="big-number" id="bigNumber">—</div>
    <div class="unit" id="bigUnit">days of work left</div>
  </section>

  <section class="stats">
    <div class="stat">
      <div class="stat-num" id="hoursLeft">—</div>
      <div class="stat-label">Working hours</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="calDays">—</div>
      <div class="stat-label">Calendar days</div>
    </div>
  </section>

  <section class="progress-wrap">
    <div class="progress-header">
      <span>Journey progress</span>
      <strong id="progressPct">0%</strong>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </section>

  <div class="note">
    Every day closer is a day softer. <span class="heart" id="heart">❤</span><br>
    You've got this, mama-to-be.
  </div>

</div>

<script>
  // ========== CONFIG ==========
  const TARGET_DATE = new Date(2026, 5, 25, 0, 0, 0);
  const START_DATE  = new Date(2026, 4, 25, 0, 0, 0);
  const HOLIDAYS = [];
  const NON_WORK_DAYS = [5, 6];
  const HOURS_PER_WORK_DAY = 24;

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ========== HELPERS ==========
  function ymd(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }
  function isWorkingDay(d) {
    if (NON_WORK_DAYS.includes(d.getDay())) return false;
    if (HOLIDAYS.includes(ymd(d))) return false;
    return true;
  }
  function countWorkingDays(from, to) {
    let count = 0;
    const cur = new Date(from);
    cur.setHours(0, 0, 0, 0);
    cur.setDate(cur.getDate() + 1);
    const end = new Date(to);
    end.setHours(0, 0, 0, 0);
    while (cur < end) {
      if (isWorkingDay(cur)) count++;
      cur.setDate(cur.getDate() + 1);
    }
    return count;
  }
  function calendarDaysBetween(from, to) {
    const ms = to.getTime() - from.getTime();
    return Math.max(0, Math.ceil(ms / (1000 * 60 * 60 * 24)));
  }

  // ========== COUNT-UP ANIMATION ==========
  function animateNumber(el, target, duration = 1200, formatter = (n) => n) {
    if (reduceMotion) { el.textContent = formatter(target); return; }
    const start = 0;
    const startTime = performance.now();
    function frame(now) {
      const t = Math.min(1, (now - startTime) / duration);
      // ease-out-cubic
      const eased = 1 - Math.pow(1 - t, 3);
      const val = Math.round(start + (target - start) * eased);
      el.textContent = formatter(val);
      if (t < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  // ========== PETALS ==========
  function spawnPetals() {
    if (reduceMotion) return;
    const container = document.getElementById('petals');
    const COUNT = 14;
    for (let i = 0; i < COUNT; i++) {
      const p = document.createElement('span');
      p.className = 'petal';
      const left = Math.random() * 100;
      const dur = 14 + Math.random() * 18;
      const delay = -Math.random() * dur;
      const drift = (Math.random() * 160 - 80) + 'px';
      p.style.left = left + 'vw';
      p.style.animationDuration = dur + 's';
      p.style.animationDelay = delay + 's';
      p.style.setProperty('--drift', drift);
      container.appendChild(p);
    }
  }

  // ========== CARD TILT ==========
  function attachTilt(card) {
    if (reduceMotion) return;
    let raf = null;
    card.addEventListener('mousemove', (e) => {
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - 0.5;
      const y = (e.clientY - r.top) / r.height - 0.5;
      if (raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        card.style.transform = `perspective(900px) rotateX(${(-y * 4).toFixed(2)}deg) rotateY(${(x * 6).toFixed(2)}deg) translateZ(0)`;
      });
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = '';
    });
  }

  // ========== HEART BURST ==========
  function burst(x, y) {
    if (reduceMotion) return;
    const glyphs = ['❤', '✿', '❀', '❤'];
    for (let i = 0; i < 10; i++) {
      const h = document.createElement('span');
      h.className = 'burst-heart';
      h.textContent = glyphs[i % glyphs.length];
      h.style.left = x + 'px';
      h.style.top = y + 'px';
      const angle = (Math.PI * 2 * i) / 10;
      const radius = 60 + Math.random() * 40;
      h.style.setProperty('--bx', (Math.cos(angle) * radius).toFixed(0) + 'px');
      h.style.setProperty('--by', (Math.sin(angle) * radius - 30).toFixed(0) + 'px');
      h.style.fontSize = (14 + Math.random() * 10) + 'px';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1200);
    }
  }

  // ========== RENDER ==========
  let lastWorkDays = null;
  function render(initial = false) {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

    const todayStr = now.toLocaleDateString('en-GB', {
      day: '2-digit', month: 'short', year: 'numeric'
    });
    document.getElementById('todayStamp').textContent = todayStr;

    document.getElementById('targetDate').textContent =
      TARGET_DATE.toLocaleDateString('en-GB', {
        day: 'numeric', month: 'long', year: 'numeric'
      });

    if (today >= TARGET_DATE) {
      document.getElementById('root').classList.add('done');
      document.getElementById('bigNumber').textContent = "You made it";
      document.getElementById('bigUnit').textContent = "maternity leave is here ✿";
      document.getElementById('hoursLeft').textContent = '0';
      document.getElementById('calDays').textContent = '0';
      document.getElementById('progressPct').textContent = '100%';
      document.getElementById('progressFill').style.width = '100%';
      return;
    }

    const workDays = countWorkingDays(today, TARGET_DATE);
    const workHours = workDays * HOURS_PER_WORK_DAY;
    const calDays = calendarDaysBetween(today, TARGET_DATE);

    const bn = document.getElementById('bigNumber');
    if (initial) {
      animateNumber(bn, workDays, 1400);
      animateNumber(document.getElementById('hoursLeft'), workHours, 1600, (n) => n.toLocaleString());
      animateNumber(document.getElementById('calDays'), calDays, 1400);
    } else {
      if (lastWorkDays !== null && lastWorkDays !== workDays) {
        bn.classList.remove('bump');
        void bn.offsetWidth;
        bn.classList.add('bump');
      }
      bn.textContent = workDays;
      document.getElementById('hoursLeft').textContent = workHours.toLocaleString();
      document.getElementById('calDays').textContent = calDays;
    }
    lastWorkDays = workDays;

    document.getElementById('bigUnit').textContent =
      workDays === 1 ? 'day of work left' : 'days of work left';

    const totalSpanMs = TARGET_DATE - START_DATE;
    const elapsedMs = now - START_DATE;
    const pct = Math.max(0, Math.min(100, (elapsedMs / totalSpanMs) * 100));

    const pctEl = document.getElementById('progressPct');
    if (initial) {
      animateNumber(pctEl, Math.round(pct), 1600, (n) => n + '%');
    } else {
      pctEl.textContent = pct.toFixed(0) + '%';
    }

    setTimeout(() => {
      document.getElementById('progressFill').style.width = pct + '%';
    }, initial ? 700 : 0);
  }

  // ========== INIT ==========
  spawnPetals();
  attachTilt(document.getElementById('mainCard'));
  document.getElementById('heart').addEventListener('click', (e) => {
    const r = e.target.getBoundingClientRect();
    burst(r.left + r.width / 2, r.top + r.height / 2);
  });

  render(true);
  setInterval(() => render(false), 60 * 1000);
</script>
</body>
</html>
