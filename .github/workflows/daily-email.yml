name: Daily Countdown Email

# Runs every day at 10:00 Asia/Jerusalem (= 07:00 UTC during IDT, end of March – end of October).
# The countdown window (now → 25 June 2026) is fully inside IDT, so 07:00 UTC is correct.
# If you want this to keep working past Oct 2026, add a second cron at "0 8 * * *" for IST (UTC+2).

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:  # lets you trigger manually from the Actions tab to test

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Send countdown email
        env:
          SMTP_HOST:   ${{ secrets.SMTP_HOST }}
          SMTP_PORT:   ${{ secrets.SMTP_PORT }}
          SMTP_USER:   ${{ secrets.SMTP_USER }}
          SMTP_PASS:   ${{ secrets.SMTP_PASS }}
          EMAIL_FROM:  ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:    ${{ secrets.EMAIL_TO }}
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
        run: node send-email.js
